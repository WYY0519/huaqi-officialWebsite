<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg5)"/>
  <!-- 农业植保无人机 -->
  <rect x="255" y="185" width="90" height="40" rx="8" fill="#00695c"/>
  <rect x="275" y="175" width="50" height="12" rx="4" fill="#00897b"/>
  <!-- 药箱 -->
  <rect x="275" y="225" width="50" height="35" rx="5" fill="#004d40"/>
  <rect x="290" y="260" width="20" height="8" rx="2" fill="#00695c"/>
  <!-- 四臂 -->
  <line x1="270" y1="195" x2="180" y2="160" stroke="#00796b" stroke-width="5"/>
  <line x1="330" y1="195" x2="420" y2="160" stroke="#00796b" stroke-width="5"/>
  <line x1="270" y1="215" x2="180" y2="250" stroke="#00796b" stroke-width="5"/>
  <line x1="330" y1="215" x2="420" y2="250" stroke="#00796b" stroke-width="5"/>
  <!-- 旋翼 -->
  <ellipse cx="180" cy="158" rx="50" ry="8" fill="#26a69a" opacity="0.6"/>
  <ellipse cx="420" cy="158" rx="50" ry="8" fill="#26a69a" opacity="0.6"/>
  <ellipse cx="180" cy="252" rx="50" ry="8" fill="#26a69a" opacity="0.6"/>
  <ellipse cx="420" cy="252" rx="50" ry="8" fill="#26a69a" opacity="0.6"/>
  <!-- 喷头 -->
  <line x1="200" y1="230" x2="200" y2="280" stroke="#00695c" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="400" y1="230" x2="400" y2="280" stroke="#00695c" stroke-width="2" stroke-dasharray="3,3"/>
  <!-- 起落架 -->
  <line x1="265" y1="270" x2="250" y2="310" stroke="#00695c" stroke-width="3"/>
  <line x1="335" y1="270" x2="350" y2="310" stroke="#00695c" stroke-width="3"/>
  <line x1="240" y1="310" x2="360" y2="310" stroke="#00695c" stroke-width="3"/>
</svg>
