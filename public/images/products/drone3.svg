  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>
  <!-- 大型六旋翼 -->
  <ellipse cx="300" cy="210" rx="50" ry="18" fill="#2e7d32"/>
  <!-- 六个臂 -->
  <line x1="300" y1="200" x2="200" y2="160" stroke="#388e3c" stroke-width="5"/>
  <line x1="300" y1="200" x2="400" y2="160" stroke="#388e3c" stroke-width="5"/>
  <line x1="300" y1="220" x2="200" y2="260" stroke="#388e3c" stroke-width="5"/>
  <line x1="300" y1="220" x2="400" y2="260" stroke="#388e3c" stroke-width="5"/>
  <line x1="300" y1="210" x2="230" y2="130" stroke="#388e3c" stroke-width="4"/>
  <line x1="300" y1="210" x2="370" y2="130" stroke="#388e3c" stroke-width="4"/>
  <!-- 旋翼 -->
  <ellipse cx="200" cy="158" rx="40" ry="7" fill="#4caf50" opacity="0.6"/>
  <ellipse cx="400" cy="158" rx="40" ry="7" fill="#4caf50" opacity="0.6"/>
  <ellipse cx="200" cy="262" rx="40" ry="7" fill="#4caf50" opacity="0.6"/>
