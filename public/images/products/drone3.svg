  <ellipse cx="230" cy="128" rx="35" ry="6" fill="#4caf50" opacity="0.6"/>
  <ellipse cx="370" cy="128" rx="35" ry="6" fill="#4caf50" opacity="0.6"/>
  <!-- 起落架 -->
  <line x1="275" y1="228" x2="260" y2="270" stroke="#2e7d32" stroke-width="3"/>
  <line x1="325" y1="228" x2="340" y2="270" stroke="#2e7d32" stroke-width="3"/>
  <line x1="250" y1="270" x2="350" y2="270" stroke="#2e7d32" stroke-width="3"/>
