<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
    <linearGradient id="drone1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg1)"/>
  <!-- 无人机机身 -->
  <ellipse cx="300" cy="220" rx="60" ry="20" fill="url(#drone1)"/>
  <rect x="295" y="195" width="10" height="25" rx="3" fill="#455a64"/>
  <!-- 四个旋翼臂 -->
  <line x1="300" y1="210" x2="220" y2="180" stroke="#37474f" stroke-width="4"/>
  <line x1="300" y1="210" x2="380" y2="180" stroke="#37474f" stroke-width="4"/>
  <line x1="300" y1="230" x2="220" y2="260" stroke="#37474f" stroke-width="4"/>
  <line x1="300" y1="230" x2="380" y2="260" stroke="#37474f" stroke-width="4"/>
  <!-- 旋翼 -->
  <ellipse cx="220" cy="178" rx="35" ry="6" fill="#546e7a" opacity="0.7"/>
  <ellipse cx="380" cy="178" rx="35" ry="6" fill="#546e7a" opacity="0.7"/>
  <ellipse cx="220" cy="262" rx="35" ry="6" fill="#546e7a" opacity="0.7"/>
  <ellipse cx="380" cy="262" rx="35" ry="6" fill="#546e7a" opacity="0.7"/>
  <!-- 起落架 -->
  <line x1="280" y1="240" x2="270" y2="280" stroke="#455a64" stroke-width="3"/>
  <line x1="320" y1="240" x2="330" y2="280" stroke="#455a64" stroke-width="3"/>
  <line x1="260" y1="280" x2="290" y2="280" stroke="#455a64" stroke-width="3"/>
  <line x1="310" y1="280" x2="340" y2="280" stroke="#455a64" stroke-width="3"/>
</svg>
