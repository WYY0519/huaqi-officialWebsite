  <rect x="280" y="230" width="40" height="30" rx="4" fill="#bf360c"/>
  <!-- 四臂 -->
  <line x1="270" y1="195" x2="180" y2="150" stroke="#e65100" stroke-width="6"/>
  <line x1="330" y1="195" x2="420" y2="150" stroke="#e65100" stroke-width="6"/>
  <line x1="270" y1="215" x2="180" y2="260" stroke="#e65100" stroke-width="6"/>
  <line x1="330" y1="215" x2="420" y2="260" stroke="#e65100" stroke-width="6"/>
  <!-- 旋翼 -->
  <ellipse cx="180" cy="148" rx="45" ry="8" fill="#ff9800" opacity="0.6"/>
  <ellipse cx="420" cy="148" rx="45" ry="8" fill="#ff9800" opacity="0.6"/>
  <ellipse cx="180" cy="262" rx="45" ry="8" fill="#ff9800" opacity="0.6"/>
  <ellipse cx="420" cy="262" rx="45" ry="8" fill="#ff9800" opacity="0.6"/>
  <!-- 起落架 -->
  <line x1="260" y1="260" x2="245" y2="300" stroke="#e65100" stroke-width="4"/>
  <line x1="340" y1="260" x2="355" y2="300" stroke="#e65100" stroke-width="4"/>
  <line x1="235" y1="300" x2="365" y2="300" stroke="#e65100" stroke-width="4"/>
</svg>
