<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>华启科技 - 无人机让生活更美好</title>
    <meta name="description" content="华天科技专注于无人机研发与应用解决方案" />
    <!-- 国内稳定镜像（推荐，解决谷歌cdn访问慢） -->
    <link rel="preconnect" href="https://fonts.font.im" />
    <link rel="stylesheet" href="https://fonts.font.im/css?family=Noto+Sans+SC:100,300,400,500,700,900" />
    <!-- 导入阿里巴巴普惠体字体 -->
    <link rel="preload" href="/fonts/AlibabaPuHuiTi-4-85-Heavy.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/AlibabaPuHuiTi-4-55-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <!-- 预加载 OPPOSans 字体 -->
    <link rel="preload" href="/fonts/OPPOSans-Regular.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/OPPOSans-Bold.woff" as="font" type="font/woff" crossorigin />
    <style>
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('/fonts/AlibabaPuHuiTi-4-55-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('/fonts/AlibabaPuHuiTi-4-65-Medium.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('/fonts/AlibabaPuHuiTi-4-75-Bold.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Alibaba PuHuiTi';
        src: url('/fonts/AlibabaPuHuiTi-4-85-Heavy.woff2') format('woff2');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }
      /* OPPOSans 字体 */
      @font-face {
        font-family: 'OPPOSans';
        src: url('/fonts/OPPOSans-Regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OPPOSans';
        src: url('/fonts/OPPOSans-Medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'OPPOSans';
        src: url('/fonts/OPPOSans-Bold.woff') format('woff');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body style="overflow-x: hidden; max-width: 100vw;">
    <!-- 页面加载时立即滚动到顶部，防止刷新时停留在底部 -->
    <script>history.scrollRestoration = 'manual'; window.scrollTo(0, 0);</script>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
